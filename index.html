<head>
  <meta charset="UTF-8" />
  <title>Earth with Country Area Tooltip</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    #tooltip {
      position: absolute;
      display: none;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 14px;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }
  </style>
</head>
<body><div id="tooltip"></div><!-- Three.js --><script src="https://unpkg.com/three/build/three.min.js"></script><script src="https://unpkg.com/three-globe"></script><script src="https://unpkg.com/topojson-client"></script><script>

// ---------------------------
// COUNTRY AREA DATA (km²)
// ---------------------------
const countryArea = {
  "India": 3287263,
  "United States of America": 9833520,
  "China": 9596961,
  "Russia": 17098242,
  "France": 551695,
  "Brazil": 8515767,
  "Australia": 7692024,
  "Canada": 9984670
};

// ---------------------------
// TOOLTIP
// ---------------------------
const tooltip = document.getElementById("tooltip");

window.addEventListener("mousemove", (e) => {
  tooltip.style.left = e.pageX + 10 + "px";
  tooltip.style.top = e.pageY + 10 + "px";
});

// ---------------------------
// SCENE SETUP
// ---------------------------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 250;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.AmbientLight(0xffffff, 1);
scene.add(light);

// ---------------------------
// GLOBE
// ---------------------------
const Globe = new ThreeGlobe()
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png');

scene.add(Globe);

// ---------------------------
// LOAD COUNTRIES
// ---------------------------
fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
  .then(res => res.json())
  .then(countries => {

    Globe.polygonsData(countries.features)
      .polygonCapColor(() => 'rgba(0,200,255,0.15)')
      .polygonSideColor(() => 'rgba(0,100,255,0.05)')
      .polygonStrokeColor(() => '#00ffff')

      // HOVER EVENT
      .onPolygonHover(country => {
        if (country) {
          const name = country.properties.name;
          const area = countryArea[name];

          tooltip.style.display = 'block';

          if (area) {
            tooltip.innerHTML = ${name}<br>${area.toLocaleString()} km²;
          } else {
            tooltip.innerHTML = ${name}<br>Area data not available;
          }
        } else {
          tooltip.style.display = 'none';
        }
      });

  });

// ---------------------------
// ANIMATION
// ---------------------------
function animate() {
  requestAnimationFrame(animate);
  Globe.rotation.y += 0.0015;
  renderer.render(scene, camera);
}
animate();

// ---------------------------
// RESIZE
// ---------------------------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script></body>
</html>
